<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCD — YouTube Channel</title>
  <meta name="description" content="TCD — Find us on YouTube.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --surface: #111;
      --border:  rgba(255,255,255,.08);
      --text:    #f0f0f0;
      --muted:   #666;
      --red:     #ff0000;
      --red-dim: rgba(255,0,0,.10);
      --red-glow:rgba(255,0,0,.20);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 52px 48px;
      max-width: 420px;
      width: calc(100% - 32px);
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
      border-radius: 12px;
    }

    .yt-icon {
      width: 56px;
      height: 56px;
      background: var(--red-dim);
      border: 1px solid var(--red-glow);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .yt-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--red);
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      margin-bottom: 14px;
    }

    .desc {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--red);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      padding: 13px 26px;
      border-radius: 8px;
      transition: opacity .15s, transform .15s;
    }

    .btn:hover {
      opacity: .88;
      transform: translateY(-1px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }

    footer {
      margin-top: 32px;
      font-size: .75rem;
      color: var(--muted);
      opacity: .5;
    }
  </style>
</head>
<body>

  <div class="card">
    <img class="logo" src="images.png" alt="TCD">
    <div class="yt-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
      </svg>
    </div>

    <p class="label">YouTube Channel</p>
    <h1>TCD</h1>
    <p class="desc">Find our videos, streams, and content on YouTube.</p>

    <a class="btn" href="https://www.youtube.com/channel/UCryGXpN-Jo0JfI1j7WKhNMQ" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
      </svg>
      Watch on YouTube
    </a>
  </div>

  <footer>tcd.group</footer>

</body>
</html>
